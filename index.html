<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANGO · Outfit Builder</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
  <header>
    <div>
      <div class="logo"><svg class="logo-svg" viewBox="55 215 390 70" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-label="MANGO"><g><polygon id="XMLID_18_" points="98.5,248.3 104.3,257.6 116,238.9 116,280.3 126.1,280.3 126.1,220.1 115.8,220.1 "/><polygon id="XMLID_22_" points="70.2,220.1 60,220.1 60,280.3 70.1,280.3 70.1,238.9 93.1,275.6 98.9,266.3 "/><polygon id="XMLID_23_" points="186.8,261.6 196.1,280.3 208.2,280.3 177.7,220.1 166.8,220.1 166.8,220.1 182,252 161.7,252 167,241.6 161.5,230.3 135.8,280.3 147.2,280.3 156.8,261.6 "/><polygon id="XMLID_24_" points="275.6,220.1 265.5,220.1 265.5,249.3 275.6,259.5 "/><polygon id="XMLID_25_" points="226.8,220.1 216.5,220.1 216.5,280.3 226.6,280.3 226.6,235.3 268.1,280.3 275.6,280.3 275.6,272.9 "/><path id="XMLID_26_" d="M346.3,236.8c-4.8-5-12.2-8.2-20.6-8.2c-13.3,0-24.3,8.2-26,18.8h-11.1c1.5-16.4,18.3-28.6,37.3-28.6c11.3,0,21.5,4.2,28.3,11L346.3,236.8z"/><path id="XMLID_27_" d="M324.7,271.9c-11.1,0-20.5-6-24.1-14.4h-11.4c3.8,14.5,18.5,24.2,36.1,24.2c4.1,0,8.8-0.4,12.6-1.4c8.8-2.2,18.4-7.9,18.4-16.9v-16h-31.8l0,10.1h21.6v4.6c0,5-7.5,8-12.2,9c-2.5,0.6-5.7,0.9-8.2,0.9H324.7z"/><path id="XMLID_28_" d="M440,250.2c0-17.9-16.3-31.8-36.3-31.8c-19.4,0-36.4,13.3-36.4,30.9c0,16.6,13.4,29.9,31.4,32v-10c-11.8-1.9-20.7-10.7-20.7-21.3c0-12,11.4-21.7,25.5-21.7c14.1,0,25.6,9.7,25.6,21.7c0,10.5-8.8,19.2-20.4,21.3v10.1C426,279.2,440,266.4,440,250.2"/></g></svg></div>
      <div class="tagline">Outfit&nbsp;Builder</div>
    </div>
    <div class="header-right">
      <div class="gender" id="gender">
        <button data-g="female" class="active">Damen</button>
        <button data-g="male">Herren</button>
      </div>
      <button class="nav-btn" id="navLooks">Meine Looks <span class="looks-count" id="looksCount"></span></button>
    </div>
  </header>

  <main>
    <!-- CATEGORIES + PRODUCTS -->
    <section class="col col-cat">
      <div class="col-title">Kategorie</div>
      <div id="cats"></div>
      <div class="products" id="products"></div>
    </section>

    <!-- STAGE -->
    <section class="col col-stage">
      <div class="col-title">Dein Look</div>
      <div class="figure-wrap" id="figure"></div>
      <div class="stage-actions">
        <button class="btn" id="resetBtn">Zurücksetzen</button>
        <button class="btn btn-primary" id="saveBtn">Look speichern</button>
      </div>
    </section>

    <!-- OUTFIT SUMMARY -->
    <section class="col col-out">
      <div class="col-title">Dein Outfit</div>
      <div id="outfitList"></div>
      <div class="total">
        <span class="t-label">Gesamt</span>
        <span class="t-val" id="total">0,00 €</span>
      </div>
      <a class="shop-link" id="shopLink" href="https://shop.mango.com/de/de/h/damen" target="_blank" rel="noopener">Alle Teile im Shop</a>
    </section>
  </main>

  <!-- LOOKS-SEITE -->
  <div class="looks-page" id="looksPage">
    <div class="looks-head">
      <h2>Meine Looks</h2>
      <button class="looks-back" id="looksBack">← Zurück zum Builder</button>
    </div>
    <div id="looksContent"></div>
  </div>

  <div class="toast" id="toast">Look gespeichert</div>

<script src="script.js"></script>
</body>
</html>
